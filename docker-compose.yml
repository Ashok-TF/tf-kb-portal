services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kbportal
      POSTGRES_PASSWORD: kbportal
      POSTGRES_DB: kbportal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://kbportal:kbportal@postgres:5432/kbportal
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - postgres

volumes:
  pgdata:
